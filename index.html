if(cons.length<1){if(item.min>0){var estDaily=Math.max(1,Math.round(item.min/14)),estDays=Math.round(item.stock/estDaily),estDate=new Date();estDate.setDate(estDate.getDate()+estDays);return{title:estDays<=7?'Agotamiento inminente':estDays<=21?'Stock limitado':estDays<=45?'Stock moderado':'Stock holgado',subtitle:'Estimado (aún sin datos de consumo)',days:String(estDays),dailyUse:'~'+estDaily,dateOut:pad(estDate.getDate())+'/'+pad(estDate.getMonth()+1),daysNum:estDays}}return null}
var total=0;cons.forEach(c=>total+=c.amount);var dates=cons.map(c=>parseTS(c.ts)).filter(Boolean),spanDays=0;if(dates.length>=2){dates.sort((a,b)=>a-b);spanDays=Math.max(1,Math.round(Math.abs(dates[dates.length-1]-dates[0])/86400000))}else if(dates.length===1){spanDays=Math.max(1,Math.round(Math.abs(new Date()-dates[0])/86400000))}else spanDays=Math.max(1,cons.length*3);var daily=total/spanDays;if(daily<=0)daily=0.1;var daysLeft=Math.round(item.stock/daily),future=new Date();future.setDate(future.getDate()+daysLeft);var desc=[],types={};cons.forEach(c=>types[c.tp]=(types[c.tp]||0)+1);if(types['salida'])desc.push(types['salida']+' salida'+(types['salida']>1?'s':''));if(types['ajuste'])desc.push(types['ajuste']+' ajuste'+(types['ajuste']>1?'s':''));return{title:daysLeft<=0?'Sin stock':daysLeft<=7?'Agotamiento inminente':daysLeft<=14?'Pedir pronto':daysLeft<=30?'Stock limitado':daysLeft<=60?'Stock moderado':'Stock holgado',subtitle:'Basado en '+(desc.length?desc.join(' + '):cons.length+' mov.')+' en '+spanDays+' día'+(spanDays>1?'s':''),days:String(daysLeft),dailyUse:daily<1?daily.toFixed(1):Math.round(daily).toString(),dateOut:pad(future.getDate())+'/'+pad(future.getMonth()+1),daysNum:daysLeft}}

function bindCommon(){document.querySelectorAll('[data-tab], .rail-tab').forEach(btn=>btn.onclick=function(){selCat=null;selSubcat=null;selItem=null;adjMode=null;adjVal='';adjNote='';pg=btn.getAttribute('data-tab');searchQ='';draw();if(pg==='search')setTimeout(()=>{var x=document.getElementById('search-in');if(x)x.focus()},40)});document.querySelectorAll('[data-cat]').forEach(btn=>btn.onclick=function(){selCat=btn.getAttribute('data-cat');draw()});document.querySelectorAll('[data-item]').forEach(btn=>btn.onclick=function(){selItem=items.find(x=>x.id===btn.getAttribute('data-item'));if(selItem)draw()});document.querySelectorAll('[data-home], #go-home-search, #go-home-alerts, #go-home-history, #go-home-report, #go-home-cat, #go-home-subcat, #go-home-item').forEach(btn=>btn.onclick=function(){selCat=null;selSubcat=null;selItem=null;adjMode=null;pg='home';draw()});var rs=document.getElementById('rail-sync');if(rs)rs.onclick=function(){toast('Sincronizando...');sync()};var rl=document.getElementById('rail-logout');if(rl)rl.onclick=function(){user=null;pg='login';draw()}}
function draw(){var A=document.getElementById('app'),html='';if(toastMsg)html+='<div style="animation:toastin .24s ease" class="fixed left-1/2 top-5 z-[100] -translate-x-1/2 rounded-full px-4 py-2 text-xs font-semibold text-white shadow-lgsoft '+(toastT==='err'?'bg-error-700':toastT==='warn'?'bg-warning-700':'bg-success-700')+'">'+esc(toastMsg)+'</div>';if(!user){A.innerHTML=html+renderLogin();var pin=document.getElementById('pin');if(pin){pin.focus();pin.oninput=function(){if(pin.disabled)return;pin.value=String(pin.value||'').replace(/\D/g,'').slice(0,4);if(pin.value.length===4){var pinAttempt=String(pin.value),firstTry=validatePinAttempt(pinAttempt);pin.disabled=true;if(firstTry.ok){completeLogin(firstTry.user);return}loadUsers(true).then(function(){var secondTry=validatePinAttempt(pinAttempt);if(secondTry.ok)completeLogin(secondTry.user);else{pin.disabled=false;pin.value='';pin.focus();toast(authError?'PIN no encontrado. Revise hoja usuarios o deployment.':'PIN incorrecto','err')}}).catch(function(){pin.disabled=false;pin.value='';pin.focus();toast('No se pudo validar el PIN','err')})}}}return}
if(selItem){A.innerHTML=html+renderDetail();bindCommon();document.getElementById('back-item').onclick=function(){selItem=null;adjMode=null;adjVal='';adjNote='';draw()};document.querySelectorAll('[data-adj]').forEach(btn=>btn.onclick=function(){adjMode=btn.getAttribute('data-adj');draw();setTimeout(()=>{var v=document.getElementById('adj-v');if(v)v.focus()},50)});var adjC=document.getElementById('adj-cancel');if(adjC)adjC.onclick=function(){adjMode=null;adjVal='';adjNote='';draw()};var adjV=document.getElementById('adj-v');if(adjV){adjV.oninput=function(){adjVal=adjV.value}}var adjN=document.getElementById('adj-n');if(adjN)adjN.oninput=function(){adjNote=adjN.value};var adjO=document.getElementById('adj-ok');if(adjO)adjO.onclick=function(){var v=parseInt(adjVal);if(isNaN(v)||v<0){toast('Valor inválido','err');return}var old=selItem.stock,ns;if(adjMode==='in')ns=old+v;else if(adjMode==='out')ns=Math.max(0,old-v);else ns=v;items=items.map(x=>x.id===selItem.id?Object.assign({},x,{stock:ns}):x);hist.unshift({id:selItem.id,nm:selItem.name,cat:selItem.cat,tp:adjMode==='in'?'ingreso':adjMode==='out'?'salida':'ajuste',os:old,ns:ns,nt:adjNote,u:user.n,ts:ts()});save();pushUpdate(selItem,old,ns,adjMode==='in'?'ingreso':adjMode==='out'?'salida':'ajuste',adjNote);selItem=Object.assign({},selItem,{stock:ns});adjMode=null;adjVal='';adjNote='';toast(selItem.name+': '+old+' → '+ns);draw()};return}
if(selCat&&!selSubcat){A.innerHTML=html+renderCategory();bindCommon();document.getElementById('back-cat').onclick=function(){selCat=null;draw()};document.getElementById('subcat-scroll').onclick=function(e){var t=e.target;while(t&&t.id!=='subcat-scroll'){if(t.hasAttribute&&t.hasAttribute('data-subcat')){selSubcat=t.getAttribute('data-subcat');draw();return}t=t.parentElement}};return}
if(selCat&&selSubcat){A.innerHTML=html+renderSubcategory();bindCommon();document.getElementById('back-subcat').onclick=function(){if(window.__hasMultipleSubs)selSubcat=null;else{selCat=null;selSubcat=null}draw()};return}
if(pg==='home')A.innerHTML=html+renderHome();if(pg==='search')A.innerHTML=html+renderSearch();if(pg==='alerts')A.innerHTML=html+renderAlerts();if(pg==='history')A.innerHTML=html+renderHistory();if(pg==='report')A.innerHTML=html+renderReport();bindCommon();var lo=document.getElementById('logout');if(lo)lo.onclick=function(){user=null;pg='login';draw()};var sy=document.getElementById('do-sync');if(sy)sy.onclick=function(){toast('Sincronizando...');sync()};var ts2=document.getElementById('top-sync');if(ts2)ts2.onclick=function(){toast('Sincronizando...');sync()};var gp=document.getElementById('gen-pdf');if(gp)gp.onclick=function(){generatePDF()};var db=document.getElementById('open-db');if(db)db.onclick=function(){window.open(SHEET_URL,'_blank')};var si=document.getElementById('search-in');if(si){si.oninput=function(){searchQ=si.value;renderSearchResults()};setTimeout(renderSearchResults,0)}}
var touchStartX=0,touchStartY=0;document.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY},{passive:true});document.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-touchStartX,dy=Math.abs(e.changedTouches[0].clientY-touchStartY);if(dx>80&&dy<80){if(selItem){selItem=null;adjMode=null;adjVal='';adjNote='';draw()}else if(selSubcat){var sm2=subcatMap(selCat);if(Object.keys(sm2).length>1)selSubcat=null;else{selCat=null;selSubcat=null}draw()}else if(selCat){selCat=null;draw()}}},{passive:true});
window.addEventListener('online',function(){authMessage='Conexión recuperada. Reintentando...';authError=false;loadUsers(true);if(user)sync()});window.addEventListener('offline',function(){authError=true;authMessage='Sin conexión a internet';draw();toast('Sin conexión: usando datos locales','warn')});window.addEventListener('error',e=>console.error('window error',e&&e.error?e.error:e));window.addEventListener('unhandledrejection',e=>console.error('unhandled rejection',e&&e.reason?e.reason:e));loadCachedUsers();draw();loadUsers(true);
  </script>
</body>
</html>
